<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00ccff"/>
      <stop offset="100%" style="stop-color:#ff44cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Snake body segments -->
  <rect x="200" y="340" width="36" height="36" rx="6" fill="#005522" opacity="0.5"/>
  <rect x="240" y="340" width="36" height="36" rx="6" fill="#006633" opacity="0.6"/>
  <rect x="280" y="340" width="36" height="36" rx="6" fill="#007744" opacity="0.65"/>
  <rect x="320" y="340" width="36" height="36" rx="6" fill="#008855" opacity="0.7"/>
  <rect x="360" y="340" width="36" height="36" rx="6" fill="#009966" opacity="0.75"/>
  <rect x="400" y="340" width="36" height="36" rx="6" fill="#00aa66" opacity="0.8"/>
  <rect x="440" y="340" width="36" height="36" rx="6" fill="#00bb77" opacity="0.85"/>
  <rect x="480" y="340" width="36" height="36" rx="6" fill="#00cc77" opacity="0.9"/>
  <rect x="520" y="340" width="36" height="36" rx="6" fill="#00dd88" opacity="0.95"/>
  <rect x="560" y="340" width="36" height="36" rx="8" fill="#00ff88"/>

  <!-- Snake head glow -->
  <rect x="560" y="340" width="36" height="36" rx="8" fill="#00ff88" filter="url(#glow)"/>

  <!-- Snake eyes -->
  <circle cx="586" cy="352" r="5" fill="#0a0a1a"/>
  <circle cx="586" cy="366" r="5" fill="#0a0a1a"/>

  <!-- Apple -->
  <circle cx="680" cy="358" r="14" fill="#ff2244"/>
  <circle cx="676" cy="352" r="4" fill="rgba(255,255,255,0.3)"/>
  <line x1="680" y1="344" x2="683" y2="336" stroke="#44aa22" stroke-width="3"/>
  <ellipse cx="688" cy="337" rx="6" ry="3" fill="#44cc22" transform="rotate(20,688,337)"/>

  <!-- Power-up star -->
  <polygon points="880,370 886,355 892,370 907,370 895,380 900,395 888,385 876,395 881,380 869,370" fill="#ffaa00" opacity="0.7"/>

  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="100" font-weight="900" fill="url(#title)">SUPER SNAKES</text>

  <!-- Subtitle -->
  <text x="600" y="260" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" fill="#aaaaaa">8 Skins  |  Power-Ups  |  10 Challenge Levels</text>

  <!-- Bottom text -->
  <text x="600" y="560" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" fill="#555555">Play free in your browser</text>

  <!-- Decorative dots (like floating particles) -->
  <circle cx="100" cy="100" r="2" fill="rgba(100,200,255,0.2)"/>
  <circle cx="300" cy="80" r="1.5" fill="rgba(100,200,255,0.15)"/>
  <circle cx="900" cy="120" r="2.5" fill="rgba(100,200,255,0.2)"/>
  <circle cx="1050" cy="200" r="1.5" fill="rgba(100,200,255,0.15)"/>
  <circle cx="150" cy="500" r="2" fill="rgba(100,200,255,0.2)"/>
  <circle cx="1000" cy="480" r="2" fill="rgba(100,200,255,0.15)"/>
  <circle cx="750" cy="550" r="1.5" fill="rgba(100,200,255,0.1)"/>
</svg>
